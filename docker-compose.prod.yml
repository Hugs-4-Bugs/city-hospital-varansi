# ═══════════════════════════════════════════════════════════════════
# AcquisitionOS — Production Docker Compose
# Phase 14.4: Deployment
# 10 services: postgres, redis, backend, celery-worker, celery-beat,
#              frontend, nginx, prometheus, grafana, realtime-service
# ═══════════════════════════════════════════════════════════════════

version: "3.9"

x-common-logging: &common-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"

x-common-restart: &common-restart
  restart: unless-stopped

x-backend-env: &backend-env
  - DATABASE_URL=postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-acquisitionos_prod}@postgres:5432/acquisitionos
  - REDIS_URL=redis://redis:6379/0
  - CELERY_BROKER_URL=redis://redis:6379/1
  - CELERY_RESULT_BACKEND=redis://redis:6379/2
  - ENVIRONMENT=production
  - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
  - ALLOWED_ORIGNS=https://${DOMAIN:-localhost}

services:
  # ── PostgreSQL ────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: acquisitionos
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-acquisitionos_prod}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d acquisitionos"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    logging: *common-logging
    restart: *common-restart
    networks:
      - backend

  # ── Redis ─────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD:-acquisitionos_redis}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-acquisitionos_redis}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M
        reservations:
          cpus: "0.25"
          memory: 256M
    logging: *common-logging
    restart: *common-restart
    networks:
      - backend

  # ── FastAPI Backend (4 Workers) ──────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --workers 4
      --loop uvloop
      --http httptools
      --access-log
    environment: *backend-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 256M
    logging: *common-logging
    restart: *common-restart
    networks:
      - backend
      - frontend

  # ── Celery Worker (8 Concurrency) ────────────────────────────────
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: >
      celery -A app.celery_app worker
      --loglevel=info
      --concurrency=8
      -Q celery,email,billing,scraping,notifications,maintenance,workflows
      --max-tasks-per-child=100
      --without-heartbeat
    environment: *backend-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.celery_app inspect ping || exit 1"]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 90s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1.5G
        reservations:
          cpus: "0.5"
          memory: 512M
    logging: *common-logging
    restart: *common-restart
    networks:
      - backend

  # ── Celery Beat (Scheduler) ──────────────────────────────────────
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: >
      celery -A app.celery_app beat
      --loglevel=info
      --scheduler celery.beat:PersistentScheduler
    environment: *backend-env
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M
    logging: *common-logging
    restart: *common-restart
    networks:
      - backend

  # ── Next.js Frontend ─────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=file:./data/acquisitionos.db
      - NEXT_PUBLIC_API_URL=https://${DOMAIN:-localhost}/api
      - NEXT_PUBLIC_WS_URL=wss://${DOMAIN:-localhost}
      - NODE_ENV=production
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M
    logging: *common-logging
    restart: *common-restart
    networks:
      - backend
      - frontend

  # ── Nginx (SSL + Rate Limiting) ──────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_webroot:/var/www/certbot:ro
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M
    logging: *common-logging
    restart: *common-restart
    networks:
      - frontend

  # ── Prometheus ───────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--storage.tsdb.retention.size=5GB"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    logging: *common-logging
    restart: *common-restart
    networks:
      - backend

  # ── Grafana ──────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-acquisitionos_grafana}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=https://${DOMAIN:-localhost}/grafana
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M
    logging: *common-logging
    restart: *common-restart
    networks:
      - backend
      - frontend

  # ── Realtime Service (WebSocket) ─────────────────────────────────
  realtime-service:
    build:
      context: ./mini-services/realtime-service
      dockerfile: Dockerfile
    environment:
      - REDIS_URL=redis://redis:6379/3
      - PORT=3003
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 64M
    logging: *common-logging
    restart: *common-restart
    networks:
      - backend
      - frontend

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  certbot_certs:
  certbot_webroot:

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
