# ═══════════════════════════════════════════════════════════════════
# AcquisitionOS — Redis StatefulSet & Service
# Phase 14.4: Deployment
# ═══════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: acquisitionos
  labels:
    app: acquisitionos
    component: redis
spec:
  serviceName: redis-svc
  replicas: 1
  selector:
    matchLabels:
      app: acquisitionos
      component: redis
  template:
    metadata:
      labels:
        app: acquisitionos
        component: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          command:
            - redis-server
            - --appendonly
            - "yes"
            - --maxmemory
            - "512mb"
            - --maxmemory-policy
            - allkeys-lru
            - --requirepass
            - $(REDIS_PASSWORD)
          envFrom:
            - secretRef:
                name: acquisitionos-secrets
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 768Mi
          livenessProbe:
            exec:
              command:
                - redis-cli
                - -a
                - "$(REDIS_PASSWORD)"
                - ping
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            exec:
              command:
                - redis-cli
                - -a
                - "$(REDIS_PASSWORD)"
                - ping
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: redis-data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: redis-svc
  namespace: acquisitionos
  labels:
    app: acquisitionos
    component: redis
spec:
  selector:
    app: acquisitionos
    component: redis
  ports:
    - port: 6379
      targetPort: 6379
      protocol: TCP
  type: ClusterIP
