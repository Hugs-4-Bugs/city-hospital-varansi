# ═══════════════════════════════════════════════════════════════════
# AcquisitionOS — Backend Deployment & Service
# Phase 14.4: Deployment
# ═══════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: acquisitionos
  labels:
    app: acquisitionos
    component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: acquisitionos
      component: backend
  template:
    metadata:
      labels:
        app: acquisitionos
        component: backend
    spec:
      containers:
        - name: backend
          image: acquisitionos/backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: acquisitionos-config
            - secretRef:
                name: acquisitionos-secrets
          env:
            - name: DATABASE_URL
              value: "postgresql+asyncpg://postgres:$(POSTGRES_PASSWORD)@$(POSTGRES_HOST):$(POSTGRES_PORT)/$(POSTGRES_DB)"
            - name: REDIS_URL
              value: "redis://:$(REDIS_PASSWORD)@$(REDIS_HOST):$(REDIS_PORT)/$(REDIS_DB)"
            - name: CELERY_BROKER_URL
              value: "redis://:$(REDIS_PASSWORD)@$(REDIS_HOST):$(REDIS_PORT)/$(CELERY_BROKER_DB)"
            - name: CELERY_RESULT_BACKEND
              value: "redis://:$(REDIS_PASSWORD)@$(REDIS_HOST):$(REDIS_PORT)/$(CELERY_RESULT_DB)"
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: backend-svc
  namespace: acquisitionos
  labels:
    app: acquisitionos
    component: backend
spec:
  selector:
    app: acquisitionos
    component: backend
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
  type: ClusterIP
