# ═══════════════════════════════════════════════════════════════════
# AcquisitionOS — Frontend Service (ClusterIP)
# ═══════════════════════════════════════════════════════════════════
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: acquisitionos
  labels:
    app: frontend
    tier: web
spec:
  type: ClusterIP
  selector:
    app: frontend
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      protocol: TCP
