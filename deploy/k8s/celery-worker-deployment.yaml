# ═══════════════════════════════════════════════════════════════════
# AcquisitionOS — Celery Worker Deployment
# Phase 14.4: Deployment
# ═══════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-worker
  namespace: acquisitionos
  labels:
    app: acquisitionos
    component: celery-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: acquisitionos
      component: celery-worker
  template:
    metadata:
      labels:
        app: acquisitionos
        component: celery-worker
    spec:
      containers:
        - name: celery-worker
          image: acquisitionos/backend:latest
          command:
            - celery
            - -A
            - app.celery_app
            - worker
            - --loglevel=info
            - --concurrency=8
            - -Q
            - celery,email,billing,scraping,notifications,maintenance,workflows
            - --max-tasks-per-child=100
          envFrom:
            - configMapRef:
                name: acquisitionos-config
            - secretRef:
                name: acquisitionos-secrets
          env:
            - name: DATABASE_URL
              value: "postgresql+asyncpg://postgres:$(POSTGRES_PASSWORD)@$(POSTGRES_HOST):$(POSTGRES_PORT)/$(POSTGRES_DB)"
            - name: REDIS_URL
              value: "redis://:$(REDIS_PASSWORD)@$(REDIS_HOST):$(REDIS_PORT)/$(REDIS_DB)"
            - name: CELERY_BROKER_URL
              value: "redis://:$(REDIS_PASSWORD)@$(REDIS_HOST):$(REDIS_PORT)/$(CELERY_BROKER_DB)"
            - name: CELERY_RESULT_BACKEND
              value: "redis://:$(REDIS_PASSWORD)@$(REDIS_HOST):$(REDIS_PORT)/$(CELERY_RESULT_DB)"
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 1.5Gi
