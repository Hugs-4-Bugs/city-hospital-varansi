# ═══════════════════════════════════════════════════════════════════
# AcquisitionOS — Backend Service (ClusterIP)
# ═══════════════════════════════════════════════════════════════════
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: acquisitionos
  labels:
    app: backend
    tier: api
spec:
  type: ClusterIP
  selector:
    app: backend
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP
